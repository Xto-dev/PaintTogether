<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paint Together</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-screen" class="screen">
    <div class="login-container">
      <h1>🎨 Paint Together</h1>
      <p>Draw with friends in real-time</p>
      <form id="login-form">
        <input type="text" id="username" placeholder="Your name" required>
        <input type="text" id="room-name" placeholder="Room name" required>
        <input type="password" id="room-password" placeholder="Room password" required>
        <button type="submit">Join Room</button>
      </form>
      <div id="error-message" class="error"></div>
    </div>
  </div>

  <div id="canvas-screen" class="screen hidden">
    <div class="header">
      <div class="room-info">
        <h2 id="room-title"></h2>
        <span id="user-name"></span>
      </div>
      <div class="users-list">
        <span>👥 Online:</span>
        <span id="users"></span>
      </div>
    </div>

    <div class="toolbar">
      <label>
        Color:
        <input type="color" id="color-picker" value="#000000">
      </label>
      <label>
        Size:
        <input type="range" id="brush-size" min="1" max="200" value="5">
        <span id="brush-size-value">5</span>
      </label>
      <label>
        Brush:
        <select id="brush-type">
          <option value="normal">Normal</option>
          <option value="calligraphy">Calligraphy</option>
          <option value="marker">Marker</option>
        </select>
      </label>
      <label>
        Opacity:
        <input type="range" id="brush-opacity" min="10" max="100" value="100">
        <span id="brush-opacity-value">100%</span>
      </label>
      <label>
        Smoothing:
        <input type="range" id="brush-smoothing" min="0" max="10" value="0">
        <span id="brush-smoothing-value">0</span>
      </label>
      <button id="eyedropper-btn">Eyedropper</button>
      <button id="eraser-btn">Eraser</button>
      <button id="clear-btn">Clear Canvas</button>
    </div>

    <div class="main-content">
      <div class="layers-panel">
        <div class="layers-header">
          <h3>Layers</h3>
          <button id="add-layer-btn">+ Add Layer</button>
        </div>
        <div id="layers-list"></div>
      </div>

      <div class="canvas-container">
        <canvas id="canvas"></canvas>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
