name: Auto Documentation

on:
  push:
    branches:
      - main
      - develop

jobs:
  update-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install MCP servers
        run: |
          npm install -g @modelcontextprotocol/server-github

      - name: Run documentation generator
        env:
          OMNIROUTE_API_KEY: ${{ secrets.OMNIROUTE_API_KEY }}
          OMNIROUTE_BASE_URL: ${{ secrets.OMNIROUTE_BASE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python src/main.py --commit HEAD

      - name: Commit updated documentation
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md CHANGELOG.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-update documentation [skip ci]"
          git push
